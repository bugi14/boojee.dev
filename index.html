<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>tsParticles playground</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b1020;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #tsparticles {
      position: fixed;
      inset: 0;
    }
    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 12px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    select {
      font-size: 14px;
      padding: 4px 8px;
    }
    h1 {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      margin: 0;
      font-weight: 300;
      font-size: 2rem;
      pointer-events: none;
    }
    #nav-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
    .nav-particle {
      position: absolute;
      left: 0;
      top: 0;
      background: none;
      border: none;
      margin: 0;
      padding: 4px 8px;
      color: #dfe7ff;
      font: inherit;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.03em;
      cursor: pointer;
      pointer-events: auto;
      transition: color 0.2s ease, text-shadow 0.2s ease;
      will-change: transform;
    }
    .nav-particle:hover,
    .nav-particle:focus-visible {
      color: #ffffff;
      text-shadow: 0 0 12px rgba(120, 170, 255, 0.9), 0 0 24px rgba(120, 170, 255, 0.5);
    }
    #destination-view {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #destination-view[hidden] {
      display: none;
    }
    #destination-label {
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.03em;
    }
    #destination-back {
      background: none;
      border: none;
      margin: 0;
      padding: 0;
      color: #9fb3ff;
      font: inherit;
      font-size: 0.95rem;
      cursor: pointer;
    }
    #destination-back:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="home-view">
    <div id="tsparticles"></div>
    <div id="nav-layer"></div>

    <div id="controls">
      <label for="preset">Preset:</label>
      <select id="preset">
        <option value="stars">stars</option>
        <option value="links">links</option>
        <option value="snow">snow</option>
        <option value="firefly">firefly</option>
        <option value="bubbles">bubbles</option>
        <option value="fountain">fountain</option>
        <option value="hyperspace">hyperspace</option>
        <option value="fire">fire</option>
      </select>
    </div>

    <h1>Darren Buttigieg</h1>
  </div>

  <div id="destination-view" hidden>
    <p id="destination-label"></p>
    <button type="button" id="destination-back">← Back</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
